seed: 42
train:
  batch_size: 16
  epochs: 100
  lr: 0.001
  weight_decay: 0.0001
  hidden_dim: 64
  heads: 4
  dropout: 0.2
  early_stop_patience: 15
  val_ratio: 0.2
  test_ratio: 0.1
  min_delta: 0.0001
paths:
  graph_csv: data/research/sample_graph_table.csv
  clinical_csv: data/research/sample_clinical_table.csv
  metabolite_csv: data/research/sample_metabolite_table.csv
  label_csv: data/research/sample_label_table.csv
  output_dir: outputs/research
model:
  node_feature_columns:
    - abundance
    - function_score
  clinical_columns:
    - age
    - bmi
    - smoking
    - family_history
  metabolite_columns:
    - bile_acids
    - scfa
    - tryptophan_metabolism
