seed: 21
train:
  batch_size: 16
  epochs: 160
  lr: 0.0002
  weight_decay: 0.0025
  hidden_dim: 80
  heads: 4
  dropout: 0.2
  edge_hidden_dim: 16
  aux_loss_weight: 0.2
  graph_only_loss_weight: 0.15
  early_stop_patience: 16
  val_ratio: 0.2
  test_ratio: 0.2
  min_delta: 0.0005
paths:
  graph_csv: outputs/graph_structure_tests_structure_aware_v2/graph_original_seed21.csv
  clinical_csv: data/research/topology_v6_sample_clinical_table.csv
  metabolite_csv: data/research/topology_v6_sample_metabolite_table.csv
  label_csv: data/research/topology_v6_sample_label_table.csv
  output_dir: outputs/graph_structure_tests_structure_aware_v2/original_seed21
model:
  node_feature_columns:
  - abundance
  - function_score
  clinical_columns:
  - age
  - bmi
  - smoking
  - family_history
  metabolite_columns:
  - bile_acids
  - scfa
  - tryptophan_metabolism
