<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ app_name }}</title>
    <style>
      body { font-family: Arial, sans-serif; max-width: 920px; margin: 32px auto; padding: 0 16px; }
      textarea { width: 100%; min-height: 260px; font-family: monospace; }
      button { margin-top: 12px; padding: 10px 18px; }
      pre { background: #f5f5f5; padding: 16px; overflow: auto; }
    </style>
  </head>
  <body>
    <h1>{{ app_name }}</h1>
    <p>Paste JSON payload and click Analyze.</p>
    <textarea id="payload">{
  "microbes": {
    "Fusobacterium": 0.18,
    "Porphyromonas": 0.15,
    "Prevotella": 0.10,
    "Streptococcus": 0.09,
    "Lactobacillus": 0.02
  },
  "clinical": {
    "age": 52,
    "bmi": 24.5,
    "smoking": 1,
    "family_history": 1
  },
  "metabolites": {
    "bile_acids": 0.8,
    "scfa": 0.3,
    "tryptophan_metabolism": 0.7
  }
}</textarea>
    <br>
    <button onclick="runAnalysis()">Analyze</button>
    <h2>Output</h2>
    <pre id="output"></pre>
    <script>
      async function runAnalysis() {
        const payload = JSON.parse(document.getElementById('payload').value);
        const res = await fetch('/analyze', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        const data = await res.json();
        document.getElementById('output').textContent = JSON.stringify(data, null, 2);
      }
    </script>
  </body>
</html>
