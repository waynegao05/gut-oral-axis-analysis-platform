seed: 42
cv:
  folds: 5
  val_ratio: 0.2
paths:
  graph_csv: data/research/topology_v6_sample_graph_table.csv
  clinical_csv: data/research/topology_v6_sample_clinical_table.csv
  metabolite_csv: data/research/topology_v6_sample_metabolite_table.csv
  label_csv: data/research/topology_v6_sample_label_table.csv
  output_dir: outputs/ctm_fusion_experiment/formal
graph_preprocess:
  keep_top_k_edges:
  min_edge_weight:
model:
  node_feature_columns:
    - abundance
    - function_score
  clinical_columns:
    - age
    - bmi
    - smoking
    - family_history
  metabolite_columns:
    - bile_acids
    - scfa
    - tryptophan_metabolism
graph_encoder:
  hidden_dim: 64
  heads: 4
  edge_hidden_dim: 16
  embedding_dim: 128
  dropout: 0.25
  batch_size: 16
  learning_rate: 0.0003
  weight_decay: 0.001
  epochs: 100
  early_stop_patience: 15
  min_delta: 0.0005
  grad_clip_norm: 1.0
fusion:
  baseline_hidden_dim: 64
  dropout: 0.3
  batch_size: 64
  learning_rate: 0.0001
  weight_decay: 0.001
  epochs: 150
  early_stop_patience: 20
  min_delta: 0.0005
  grad_clip_norm: 1.0
ctm:
  d_model: 128
  iterations: 8
  memory_length: 5
  nlm_hidden_dim: 8
  n_heads: 4
  d_input: 64
  n_synch_out: 128
  n_synch_action: 64
  n_self_pairs: 8
  synapse_depth: 2
