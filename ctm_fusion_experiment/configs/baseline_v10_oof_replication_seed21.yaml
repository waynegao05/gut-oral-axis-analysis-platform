seed: 21
cv:
  folds: 5
  val_ratio: 0.2
paths:
  graph_csv: data/research/topology_v6_sample_graph_table.csv
  clinical_csv: data/research/topology_v6_sample_clinical_table.csv
  metabolite_csv: data/research/topology_v6_sample_metabolite_table.csv
  label_csv: data/research/topology_v6_sample_label_table.csv
  output_dir: outputs/ctm_fusion_experiment/baseline_v10_oof_replication_seed21
graph_preprocess:
  keep_top_k_edges:
  min_edge_weight:
model:
  node_feature_columns:
    - abundance
    - function_score
  clinical_columns:
    - age
    - bmi
    - smoking
    - family_history
  metabolite_columns:
    - bile_acids
    - scfa
    - tryptophan_metabolism
graph_encoder:
  hidden_dim: 64
  heads: 4
  edge_hidden_dim: 16
  embedding_dim: 128
  dropout: 0.25
  batch_size: 16
  learning_rate: 0.0003
  weight_decay: 0.001
  epochs: 100
  early_stop_patience: 15
  min_delta: 0.0005
  grad_clip_norm: 1.0
fusion:
  baseline_hidden_dim: 64
  dropout: 0.1
  batch_size: 64
  learning_rate: 0.0003
  weight_decay: 0.001
  epochs: 120
  early_stop_patience: 15
  min_delta: 0.0005
  grad_clip_norm: 1.0
ctm:
  d_model: 64
  iterations: 4
  memory_length: 3
  nlm_hidden_dim: 4
  n_heads: 4
  d_input: 64
  n_synch_out: 64
  n_synch_action: 32
  n_self_pairs: 4
  synapse_depth: 2
baseline_v5:
  graph_seeds:
    - 0
    - 101
  baseline_seeds:
    - 11
    - 23
  pairwise_ranking_weight: 0.04
  pairwise_margin: 0.0
  min_validation_c_index_delta: 0.001
  softmax_temperature: 0.01
  selection_policy: ensemble_only_or_reference
  max_top_k: 4
baseline_v9:
  inner_folds: 3
  inner_val_ratio: 0.2
  min_oof_c_index_delta: 0.001
  min_validation_gate_delta: 0.0
